name: CI

# Triggers: develop branch validation only.
# Feature branches use ci-feature.yml (fast path) instead.
# PRs to main rely on branch protection requiring this check suite to pass
# on the source branch before merge — no need for workflow_call.
on:
  push:
    branches: [develop]
  pull_request:
    branches: [develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  # ===========================================
  # Linting - runs on Ubuntu for speed
  # ===========================================
  lint:
    name: Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: crosslink
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            crosslink/target/
          key: ${{ runner.os }}-cargo-lint-${{ hashFiles('crosslink/Cargo.lock') }}

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy (strict)
        run: cargo clippy -- -D warnings -W clippy::unwrap_used -W clippy::expect_used

  # ===========================================
  # Security Audit
  # ===========================================
  security:
    needs: lint
    name: Security Audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: crosslink
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Run security audit
        run: cargo audit

  # ===========================================
  # Tests - Cross Platform
  # ===========================================
  test:
    needs: lint
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    defaults:
      run:
        working-directory: crosslink
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    env:
      # Proptests only run on Ubuntu here; the dedicated Property Tests job runs 1000 cases
      PROPTEST_CASES: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            crosslink/target/
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('crosslink/Cargo.lock') }}

      - name: Build
        run: cargo build --verbose

      - name: Run unit tests (with proptests, Ubuntu only)
        if: matrix.os == 'ubuntu-latest'
        run: cargo test --bin crosslink --verbose

      - name: Run unit tests (skip proptests, macOS/Windows)
        if: matrix.os != 'ubuntu-latest'
        run: cargo test --bin crosslink --verbose -- --skip proptest

      - name: Run integration tests
        run: cargo test --test cli_integration --verbose

  # ===========================================
  # Property-Based Tests (extended)
  # ===========================================
  proptest:
    needs: test
    name: Property Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: crosslink
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            crosslink/target/
          key: ${{ runner.os }}-cargo-proptest-${{ hashFiles('crosslink/Cargo.lock') }}

      - name: Run property-based tests (extended)
        run: cargo test proptest --bin crosslink -- --test-threads=1
        env:
          PROPTEST_CASES: 1000

  # ===========================================
  # Fuzzing (Linux only, nightly)
  # ===========================================
  fuzz:
    needs: test
    name: Fuzz Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: crosslink
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            crosslink/target/
            crosslink/fuzz/target/
          key: ${{ runner.os }}-cargo-fuzz-${{ hashFiles('crosslink/Cargo.lock') }}

      - name: Fuzz create_issue (30 seconds)
        run: cargo +nightly fuzz run fuzz_create_issue -- -max_total_time=30
        continue-on-error: true

      - name: Fuzz search (30 seconds)
        run: cargo +nightly fuzz run fuzz_search -- -max_total_time=30
        continue-on-error: true

      - name: Fuzz import (30 seconds)
        run: cargo +nightly fuzz run fuzz_import -- -max_total_time=30
        continue-on-error: true
