name: Publish to crates.io

# Release pipeline: validates release PRs (dry-run) and publishes on tag push.
# PRs to main come from release/* or hotfix/* branches (git flow).
# Tag pushes trigger the actual crates.io publish.
#
# NOTE: This workflow does NOT re-run CI. Branch protection on main requires
# the CI check suite to pass before merge. By the time this runs, CI has
# already passed on the PR branch. This avoids duplicate CI runs.
on:
  push:
    tags:
      - 'v*'
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  dry-run:
    name: Publish Dry Run
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: crosslink
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Package dry run
        run: cargo publish --locked --dry-run

  publish:
    name: Publish
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment: cargo
    defaults:
      run:
        working-directory: crosslink
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Verify tag matches Cargo.toml version
        run: |
          CARGO_VERSION=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "crosslink") | .version')
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$CARGO_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match Cargo.toml version ($CARGO_VERSION)"
            exit 1
          fi

      - name: Publish to crates.io
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
