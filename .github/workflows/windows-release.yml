name: Windows Release

# Builds the Windows binary and attaches it to a GitHub Release.
# Runs on tag pushes AND can be triggered manually from any branch
# via the Actions tab → "Run workflow" dropdown.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag for the release (e.g. v0.9.0-beta.1). Leave empty to skip creating a release (just build & upload artifact).'
        required: false
        type: string

permissions:
  contents: write  # needed to create/update releases

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  build-windows:
    name: Build Windows binary
    runs-on: windows-latest
    defaults:
      run:
        working-directory: crosslink
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            crosslink/target/
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('crosslink/Cargo.lock') }}

      - name: Build release
        run: cargo build --locked --release --target x86_64-pc-windows-msvc

      - name: Rename binary for upload
        shell: bash
        run: |
          cp crosslink/target/x86_64-pc-windows-msvc/release/crosslink.exe crosslink-win.exe
          ls -lh crosslink-win.exe

      - name: Upload artifact (always)
        uses: actions/upload-artifact@v4
        with:
          name: crosslink-win.exe
          path: crosslink/crosslink-win.exe
          if-no-files-found: error

  create-release:
    name: Create GitHub Release
    needs: build-windows
    runs-on: ubuntu-latest
    # Only create a release on tag pushes. On manual dispatch, the user
    # can download the artifact from the Actions run instead.
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Download Windows binary
        uses: actions/download-artifact@v4
        with:
          name: crosslink-win.exe

      - name: Create/update release and upload binary
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          files: crosslink-win.exe
          draft: false
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') || contains(github.ref_name, 'rc') }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
