project:
  type: website
  output-dir: ../docs

website:
  title: "crosslink"
  navbar:
    background: "#F9F4F5"
    left:
      - text: Getting Started
        menu:
          - getting-started/quickstart.qmd
          - getting-started/installation.qmd
      - text: Guides
        menu:
          - guides/session-workflow.qmd
          - guides/multi-agent.qmd
          - guides/kickoff.qmd
          - guides/swarm.qmd
          - guides/container-agents.qmd
          - guides/knowledge.qmd
          - guides/tui.qmd
          - guides/hooks.qmd
          - guides/tracking-modes.qmd
      - text: Reference
        menu:
          - reference/commands.qmd
          - reference/hook-config.qmd
          - reference/rules.qmd
          - reference/kickoff-report.qmd
    right:
      - icon: github
        href: https://github.com/forecast-bio/crosslink

  sidebar:
    - title: "Getting Started"
      style: docked
      contents:
        - getting-started/quickstart.qmd
        - getting-started/installation.qmd
    - title: "Guides"
      contents:
        - guides/session-workflow.qmd
        - guides/multi-agent.qmd
        - guides/kickoff.qmd
        - guides/swarm.qmd
        - guides/container-agents.qmd
        - guides/knowledge.qmd
        - guides/tui.qmd
        - guides/hooks.qmd
        - guides/tracking-modes.qmd
    - title: "Reference"
      contents:
        - reference/commands.qmd
        - reference/hook-config.qmd
        - reference/rules.qmd
        - reference/kickoff-report.qmd

  page-footer:
    center: "Built with [Quarto](https://quarto.org) | [MIT License](https://github.com/forecast-bio/crosslink/blob/main/LICENSE)"

format:
  html:
    theme:
      - pandoc
      - brand
      - theme-light.scss
    css:
      - styles.css
      - assets/styles.css
    toc: true
    toc-location: right
    include-in-header:
    - text: |
        <style>
        .navbar-logo {
          max-height: unset;
          height: 18px;
          margin-top: -1px;
        }
        .navbar-brand {
          margin-top: -4px;
        }
        .navbar-brand.navbar-brand-logo {
          margin-right: 0px;
        }
        .navbar-title {
          color: #F95838;
          font-size: 19pt;
          font-family: 'Times New Roman';
          font-style: italic;
          letter-spacing: -0.6px;
        }
        </style>

    code-copy: true
    code-overflow: wrap
    highlight-style: github
