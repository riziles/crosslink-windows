<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 150 100" width="150" height="100">
  <!-- Base platform — where it lands -->
  <g style="mix-blend-mode: multiply">
    <rect x="25" y="62" width="100" height="24" rx="12" fill="#00A6DB"/>
  </g>
  <!-- Download arrow body -->
  <g style="mix-blend-mode: multiply">
    <rect x="60" y="10" width="22" height="40" rx="6" fill="#007C35"/>
  </g>
  <!-- Download arrow head -->
  <g style="mix-blend-mode: multiply">
    <polygon points="45,45 97,45 71,72" fill="#007C35"/>
  </g>
  <!-- Accent dot -->
  <g style="mix-blend-mode: multiply">
    <circle cx="125" cy="30" r="14" fill="#FFCE02"/>
  </g>
  <!-- Small spark -->
  <g style="mix-blend-mode: multiply">
    <circle cx="20" cy="28" r="10" fill="#F95838"/>
  </g>
</svg>
